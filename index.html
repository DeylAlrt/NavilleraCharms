<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Css_Folder/navbar.css">
    <link rel="stylesheet" href="Css_Folder/animations.css">
    <link rel="stylesheet" href="Css_Folder/style.css">
    <title>NavilleraCharms</title>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                
                <img src="https://ik.imagekit.io/mpojoducq/N%20(6).png" alt="Navillera Logo" class="logo">

                <ul class="nav-menu">
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Charms</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">FAQs</a></li>
                </ul>

                <div class="nav-right">
                    <div class="nav-icons">
                        <button class="icon-btn"><img src="https://img.icons8.com/?size=100&id=82712&format=png&color=FFFFFF" alt="Search" width="24" height="24"></button>
                        <button class="icon-btn"><img src="https://img.icons8.com/?size=100&id=22167&format=png&color=FFFFFF" alt="Cart" width="24" height="24"></button>
                        <button class="icon-btn"><img src="https://img.icons8.com/?size=100&id=ckzyIeK3KzhH&format=png&color=FFFFFF" alt="Profile" width="24" height="24"></button>
                    </div>

                    <button class="hamburger">
                        <img src="https://img.icons8.com/?size=100&id=VypMXfzO4ZOq&format=png&color=FFFFFF" alt="Menu" width="28" height="28">
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <div class="intro">
        <picture>
            <source media="(max-width: 768px)" srcset="https://ik.imagekit.io/jdwr5wztm/Main_Background_Mobile.png">
            <img src="https://ik.imagekit.io/mpojoducq/Main_Background.png?updatedAt=1774355845551" class="background-image" alt="Navillera Background">
        </picture>

        <a href="https://navillera.vercel.app/" class="build">Build Now</a>
    </div>
    
    <section class="section_1">
        <div class="text-container">
            <h2 class="title">italian</h2>
            <p class="subtitle">charm bracelet</p>
            <p class="subtitle_effect" aria-hidden="true">charm bracelet</p>
        </div> 
          
        <div class="anim-container">
            <img src="https://ik.imagekit.io/jdwr5wztm/container.png" class="container" alt="Container Image">
            <img src="https://ik.imagekit.io/jdwr5wztm/Section1_Bracelet.png?updatedAt=1774431619903" class="Section1_Bracelet" alt="Bracelet">
            <img src="https://ik.imagekit.io/jdwr5wztm/Circle.png" class="Circle" alt="Circle Design">
            <img src="https://ik.imagekit.io/jdwr5wztm/Link1.png" class="Link1" alt="Link Design 1">
            <img src="https://ik.imagekit.io/jdwr5wztm/Link2.png" class="Link2" alt="Link Design 2">
            <img src="https://ik.imagekit.io/jdwr5wztm/Link3.png" class="Link3" alt="Link Design 3">
            <img src="https://ik.imagekit.io/jdwr5wztm/Link4.png" class="Link4" alt="Link Design 4">
        </div>
        
        <div class="text-container2">
            <p class="primary-text">Customizable bracelet</p>
            <p class="secondary-text">made of interlocking links
                <br>where each charm tells a unique story
            </p>
            <a href="#" class="collection">Charm Collection</a>
        </div>
    </section>

    <section class="collections">
        <h2 class="collections__title">
            <img class="collections__plus" src="https://ik.imagekit.io/jdwr5wztm/star.png">COLLECTIONS
        </h2>

        <div class="collections__grid">
            <a href="#" class="collections__card">
            <div class="collections__img-wrap">
                <img src="https://ik.imagekit.io/jdwr5wztm/Links.png" width="50%" alt="Links" />
            </div>
            <span class="collections__label">Links</span>
            </a>

            <a href="#" class="collections__card">
            <div class="collections__img-wrap">
                <img src="https://ik.imagekit.io/jdwr5wztm/Bracelet.png" alt="Bracelets" />
            </div>
            <span class="collections__label">Bracelets</span>
            </a>

            <a href="#" class="collections__card">
            <div class="collections__img-wrap">
                <img src="https://ik.imagekit.io/jdwr5wztm/watch.png" alt="Watch" />
            </div>
            <span class="collections__label">Watch</span>
            </a>

            <a href="#" class="collections__card">
            <div class="collections__img-wrap">
                <img src="https://ik.imagekit.io/jdwr5wztm/Keychain.png" alt="Keychain" />
            </div>
            <span class="collections__label">Keychain</span>
            </a>
        </div>
    </section>


    <footer>
        <h1> Navillera Footer </h1>
    </footer>

    <script src="Js_Folder/script.js" defer></script>

</body>
</html>
